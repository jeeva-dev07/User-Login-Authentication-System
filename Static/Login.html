<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Auth System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="auth-container">
        <h2>User Login</h2>
        <form id="loginForm">
            <div class="form-group">
                <label for="loginUser">Username</label>
                <input type="text" id="loginUser" placeholder="Enter username" required>
            </div>
            <div class="form-group">
                <label for="loginPass">Password</label>
                <input type="password" id="loginPass" placeholder="Enter password" required>
            </div>
            
            <div id="loginError" class="error-box" style="display: none; color: red; margin-bottom: 15px;"></div>
            
            <button type="submit" class="btn">Login</button>
        </form>
        <p class="auth-footer">Don't have an account? <a href="register.html">Register here</a></p>
    </div>

    <script src="script.js"></script>
</body>
</html>
